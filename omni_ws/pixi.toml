# ============================================================
# RoboStack (ROS 2 Humble) environment for the Omni-Bot MVP, managed by pixi.
#
#   pixi install            # create the env (downloads ROS 2 Humble, Gazebo, Nav2)
#   pixi run build          # colcon build the workspace
#   pixi shell              # drop into an activated shell (env + workspace sourced)
#
# See the README "Run with RoboStack + pixi" section for the full workflow.
# ============================================================

[workspace]
name = "omni-bot"
version = "0.1.0"
description = "Omni-wheeled (mecanum) ROS 2 Humble robot MVP — RoboStack/pixi build."
authors = ["Machiraju <machirajus7@gmail.com>"]
channels = ["conda-forge", "robostack-staging"]
# Only platforms where ros-gz is available in RoboStack. osx-arm64 = Apple Silicon.
platforms = ["osx-arm64", "linux-64"]

[dependencies]
# ---- Core ROS 2 Humble (RoboStack) ----
ros-humble-desktop = "*"                       # rclpy, rviz2, robot_state_publisher, tf2 ...
ros-humble-xacro = "*"                          # xacro CLI used to expand the URDF
ros-humble-ros-gz = "*"                         # Gazebo Sim (Fortress) + ros_gz_sim + ros_gz_bridge
ros-humble-joint-state-publisher-gui = "*"
ros-humble-navigation2 = "*"
ros-humble-nav2-bringup = "*"
ros-humble-teleop-twist-keyboard = "*"

# ---- Build toolchain (for colcon build) ----
colcon-common-extensions = "*"
compilers = "*"
cmake = "*"
ninja = "*"
pkg-config = "*"
setuptools = "*"
python = "3.11.*"

[tasks]
# Build the overlay workspace.
# NOTE: plain `colcon build` (no --symlink-install). Newer setuptools in the
# RoboStack env dropped the legacy `setup.py develop --editable` path that
# --symlink-install uses for Python packages, which breaks the build. If you
# want symlink-install back (edit launch/config without rebuilding), pin an
# older setuptools in [dependencies]:  setuptools = "<80"  then use
# `colcon build --symlink-install`.
build = "colcon build"

# Full demo: Gazebo sim + apriori map + AMCL + Nav2 + RViz.
# (Sources the freshly built overlay before launching.)
sim = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_bringup sim_navigation.launch.py'", depends-on = ["build"] }

# Just the Gazebo simulation (no navigation). Run this in terminal 1.
gazebo = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_gazebo sim.launch.py'", depends-on = ["build"] }

# Just localization (AMCL) + Nav2 + RViz. Run this in terminal 2, after `gazebo`.
nav = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_navigation navigation.launch.py'", depends-on = ["build"] }

# Nav2 stack WITHOUT RViz (use if RViz is crashing on macOS). Send goals via CLI.
nav-norviz = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_navigation navigation.launch.py use_rviz:=false'", depends-on = ["build"] }

# Launch RViz on its own with the nav config (to isolate RViz crashes).
rviz = { cmd = "bash -c 'source install/setup.bash && rviz2 -d install/omni_navigation/share/omni_navigation/config/nav.rviz'", depends-on = ["build"] }

# Same as `nav` but with a full launch traceback for debugging.
nav-debug = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_navigation navigation.launch.py --debug 2>&1 | tail -50'", depends-on = ["build"] }

# Manual keyboard control (run in a second terminal).
teleop = { cmd = "bash -c 'source install/setup.bash && ros2 run teleop_twist_keyboard teleop_twist_keyboard'", depends-on = ["build"] }

# View the robot model only.
view = { cmd = "bash -c 'source install/setup.bash && ros2 launch omni_description rsp.launch.py'", depends-on = ["build"] }
